name: Sync GitHub to Bitbucket

on:
  push:
    branches:
      - main
      - master
      - raven

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Bitbucket
        run: |
          git remote remove bitbucket || true
          git remote add bitbucket https://ravendra_dev_admin:${BITBUCKET_TOKEN}@bitbucket.org/ravendra-dev-1447/whatsappchat.git
          git push bitbucket main --force
          git push bitbucket raven --force
          git push bitbucket --tags --force
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
