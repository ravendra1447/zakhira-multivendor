name: Sync GitHub to Bitbucket

on:
  push:
    branches:
      - main
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Bitbucket
        run: |
          git remote add bitbucket https://x-token-auth:${BITBUCKET_TOKEN}@bitbucket.org/ravendra-dev-1447/whatsappchat.git
          git push bitbucket --all --force
          git push bitbucket --tags --force
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
