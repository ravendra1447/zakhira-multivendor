flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/zakhira_logo.jpeg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/zakhira_logo.jpeg
    - assets/chat_bg.png
    - assets/sounds/send.mp3
    - assets/sounds/receive.mp3
    - assets/sounds/delivered.mp3
    - assets/sounds/read.mp3
    - assets/upi_qr_code.jpeg

