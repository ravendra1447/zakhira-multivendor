name: Sync GitHub raven to Bitbucket main

on:
  push:
    branches:
      - raven

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add Bitbucket remote
        run: |
          git remote remove bitbucket || true
          git remote add bitbucket https://ravendra_dev_admin:${BITBUCKET_TOKEN}@bitbucket.org/ravendra-dev-1447/whatsappchat.git
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}

      - name: Push raven → Bitbucket main
        run: |
          git push bitbucket raven:main --force-with-lease
